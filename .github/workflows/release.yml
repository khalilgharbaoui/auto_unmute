name: Build &amp; publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to Chrome Web Store after build'
        type: boolean
        default: false
      target:
        description: 'Publish target'
        type: choice
        options: [default, trustedTesters]
        default: default

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: ver
        run: echo "version=$(node -e "console.log(require('./manifest.json').version)")" >> "$GITHUB_OUTPUT"

      - name: Build ZIP
        run: bash scripts/build-zip.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto_unmute-${{ steps.ver.outputs.version }}
          path: dist/auto_unmute-${{ steps.ver.outputs.version }}.zip
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/auto_unmute-${{ steps.ver.outputs.version }}.zip
          generate_release_notes: true

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Publish on tag pushes, OR when manually dispatched with publish=true.
    # Skipped automatically if any required secret is missing.
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish == true)
    steps:
      - uses: actions/checkout@v4

      - name: Check for required secrets
        id: gate
        env:
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          if [ -z "$EXTENSION_ID" ] || [ -z "$CLIENT_ID" ] || [ -z "$CLIENT_SECRET" ] || [ -z "$REFRESH_TOKEN" ]; then
            echo "::warning::CWS_* secrets not set — skipping publish step. Configure them in repo Settings → Secrets and variables → Actions."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build ZIP
        if: steps.gate.outputs.ready == 'true'
        run: bash scripts/build-zip.sh

      - name: Resolve ZIP path
        if: steps.gate.outputs.ready == 'true'
        id: zip
        run: |
          v=$(node -e "console.log(require('./manifest.json').version)")
          echo "path=dist/auto_unmute-${v}.zip" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        if: steps.gate.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install chrome-webstore-upload-cli
        if: steps.gate.outputs.ready == 'true'
        run: npm install -g chrome-webstore-upload-cli@3

      - name: Upload new ZIP to Chrome Web Store
        if: steps.gate.outputs.ready == 'true'
        env:
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          chrome-webstore-upload upload \
            --source "${{ steps.zip.outputs.path }}" \
            --extension-id "$EXTENSION_ID" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --refresh-token "$REFRESH_TOKEN"

      - name: Submit for review
        if: steps.gate.outputs.ready == 'true'
        env:
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          TARGET: ${{ inputs.target || 'default' }}
        run: |
          chrome-webstore-upload publish \
            --extension-id "$EXTENSION_ID" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --refresh-token "$REFRESH_TOKEN" \
            --target "$TARGET"
