<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" font-family="-apple-system, 'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="56"/>
    </filter>
  </defs>

  <rect width="1600" height="480" fill="url(#bg)"/>
  <g stroke="#1f2a44" stroke-width="1" opacity="0.4">
    <path d="M0 120 H1600 M0 240 H1600 M0 360 H1600"/>
    <path d="M400 0 V480 M800 0 V480 M1200 0 V480"/>
  </g>
  <ellipse cx="1240" cy="240" rx="320" ry="220" fill="#22c55e" opacity="0.20" filter="url(#soft)"/>
  <ellipse cx="380" cy="240" rx="220" ry="180" fill="#ef4444" opacity="0.12" filter="url(#soft)"/>

  <!-- Wordmark -->
  <g transform="translate(80 200)">
    <text font-size="84" font-weight="800" fill="#f8fafc" letter-spacing="-2">Auto</text>
    <text x="190" font-size="84" font-weight="800" fill="#86efac" letter-spacing="-2">Unmute</text>
    <text y="50" font-size="20" font-weight="500" fill="#94a3b8">Chrome extension for Google Meet</text>
    <g transform="translate(0 90)">
      <rect width="200" height="36" rx="18" fill="#052e16" stroke="#22c55e"/>
      <text x="100" y="23" text-anchor="middle" font-size="13" font-weight="800" fill="#86efac">100% LOCAL · MIT</text>
    </g>
    <g transform="translate(212 90)">
      <rect width="220" height="36" rx="18" fill="#1e293b" stroke="#334155"/>
      <text x="110" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#cbd5e1">NEVER AUTO-MUTES</text>
    </g>
  </g>

  <!-- Right: muted → unmuted -->
  <g transform="translate(1100 240)">
    <g transform="translate(-60 0)">
      <circle r="92" fill="url(#redGrad)" opacity="0.22"/>
      <circle r="64" fill="url(#redGrad)"/>
      <g transform="translate(-26 -34)" fill="#fff">
        <rect x="14" y="0" width="24" height="40" rx="12"/>
        <path d="M4 32 a22 22 0 0 0 44 0 v-4 h-6 v4 a16 16 0 0 1 -32 0 v-4 h-6 z"/>
        <rect x="22" y="60" width="8" height="14"/>
        <rect x="14" y="74" width="24" height="4" rx="2"/>
      </g>
      <line x1="-58" y1="-58" x2="58" y2="58" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
    </g>
    <g transform="translate(120 0)" stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-32 0 H32 M20 -12 L32 0 L20 12"/>
      <text x="0" y="-22" text-anchor="middle" font-size="13" font-weight="700" fill="#94a3b8" stroke="none">~400 ms</text>
    </g>
    <g transform="translate(300 0)">
      <circle r="106" fill="url(#greenGrad)" opacity="0.10"/>
      <circle r="92" fill="url(#greenGrad)" opacity="0.22"/>
      <circle r="64" fill="url(#greenGrad)"/>
      <g transform="translate(-26 -34)" fill="#0b1220">
        <rect x="14" y="0" width="24" height="40" rx="12"/>
        <path d="M4 32 a22 22 0 0 0 44 0 v-4 h-6 v4 a16 16 0 0 1 -32 0 v-4 h-6 z"/>
        <rect x="22" y="60" width="8" height="14"/>
        <rect x="14" y="74" width="24" height="4" rx="2"/>
      </g>
      <g stroke="#22c55e" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9">
        <path d="M86 -20 Q104 0 86 20"/>
        <path d="M104 -32 Q132 0 104 32"/>
      </g>
    </g>
  </g>
</svg>
