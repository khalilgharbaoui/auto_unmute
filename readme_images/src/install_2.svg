<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" font-family="-apple-system, 'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="580" fill="#f1f3f4"/>

  <!-- Chrome toolbar -->
  <rect width="1000" height="60" fill="#dee1e6"/>
  <rect x="20" y="14" width="800" height="32" rx="16" fill="#fff"/>
  <text x="44" y="36" font-size="13" fill="#3c4043">🔒 meet.google.com/abc-defg-hij</text>

  <!-- Extensions puzzle icon + pinned icon -->
  <g transform="translate(840 18)">
    <rect width="32" height="28" rx="6" fill="#e8eaed"/>
    <text x="16" y="20" text-anchor="middle" font-size="14">🧩</text>
  </g>

  <!-- Our pinned icon -->
  <g transform="translate(880 18)">
    <rect width="32" height="28" rx="6" fill="#fff" stroke="#1a73e8" stroke-width="2"/>
    <g transform="translate(16 14)">
      <circle r="11" fill="url(#greenGrad)"/>
      <g transform="translate(-4 -7)" fill="#0b1220">
        <rect x="0" y="0" width="8" height="10" rx="4"/>
        <path d="M-3 8 a7 7 0 0 0 14 0 v-1 h-2 v1 a5 5 0 0 1 -10 0 v-1 h-2 z"/>
      </g>
    </g>
  </g>

  <!-- Annotation -->
  <g stroke="#ea4335" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M896 80 Q896 60 896 50"/>
    <path d="M888 58 L896 46 L904 58"/>
  </g>
  <g transform="translate(720 86)">
    <rect width="240" height="40" rx="6" fill="#ea4335"/>
    <text x="120" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Pin Auto Unmute to toolbar</text>
  </g>

  <!-- Permission dialog -->
  <g transform="translate(80 100)">
    <rect width="640" height="380" rx="12" fill="#fff" stroke="#dadce0"/>
    <text x="32" y="50" font-size="18" font-weight="500" fill="#202124">meet.google.com wants to</text>

    <g transform="translate(32 80)">
      <text font-size="20">🎤</text>
      <text x="36" y="16" font-size="15" fill="#3c4043">Use your microphone</text>
    </g>
    <g transform="translate(32 120)">
      <text font-size="20">📷</text>
      <text x="36" y="16" font-size="15" fill="#3c4043">Use your camera</text>
    </g>

    <text x="32" y="200" font-size="13" fill="#5f6368">Auto Unmute reads both locally to detect when you start talking.</text>
    <text x="32" y="222" font-size="13" fill="#5f6368">Nothing is recorded or sent to any server.</text>

    <g transform="translate(360 300)">
      <rect width="120" height="40" rx="6" fill="#fff" stroke="#dadce0"/>
      <text x="60" y="26" text-anchor="middle" font-size="14" fill="#1a73e8">Block</text>
    </g>
    <g transform="translate(496 300)">
      <rect width="120" height="40" rx="6" fill="#1a73e8"/>
      <text x="60" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Allow</text>
    </g>

    <g stroke="#ea4335" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M548 360 Q548 380 548 400"/>
      <path d="M540 392 L548 404 L556 392"/>
    </g>
  </g>

  <g transform="translate(480 510)">
    <rect width="160" height="40" rx="6" fill="#ea4335"/>
    <text x="80" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Click "Allow"</text>
  </g>
</svg>
