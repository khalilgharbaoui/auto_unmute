<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="-apple-system, 'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="620" fill="#f1f3f4"/>

  <!-- Browser chrome -->
  <rect width="1000" height="76" fill="#dee1e6"/>
  <g transform="translate(20 38)">
    <circle r="7" fill="#ef4444"/>
    <circle cx="22" r="7" fill="#f59e0b"/>
    <circle cx="44" r="7" fill="#22c55e"/>
  </g>
  <g transform="translate(96 16)">
    <path d="M0 26 Q0 0 26 0 H180 L196 13 L180 26 z" fill="#fff"/>
    <text x="14" y="18" font-size="12" fill="#5f6368">Extensions</text>
  </g>
  <rect x="96" y="42" width="800" height="30" rx="15" fill="#fff"/>
  <text x="120" y="62" font-size="13" fill="#3c4043">🔒 chrome://extensions</text>

  <!-- Page title bar -->
  <rect y="76" width="1000" height="80" fill="#fff"/>
  <text x="48" y="124" font-size="22" font-weight="500" fill="#202124">Extensions</text>

  <!-- Developer mode toggle row -->
  <rect x="640" y="100" width="320" height="40" rx="6" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="660" y="125" font-size="14" fill="#1a73e8" font-weight="600">Developer mode</text>
  <g transform="translate(906 110)">
    <rect width="40" height="20" rx="10" fill="#1a73e8"/>
    <circle cx="30" cy="10" r="8" fill="#fff"/>
  </g>

  <!-- Annotation arrow + label for dev mode -->
  <g stroke="#ea4335" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M620 60 Q700 60 800 100"/>
    <path d="M796 86 L800 100 L786 102"/>
  </g>
  <g transform="translate(380 30)">
    <rect width="240" height="40" rx="6" fill="#ea4335"/>
    <text x="120" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">① Toggle Developer mode ON</text>
  </g>

  <!-- Action buttons row -->
  <g transform="translate(48 180)">
    <rect width="160" height="40" rx="6" fill="#1a73e8"/>
    <text x="80" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Load unpacked</text>
    <rect x="180" width="160" height="40" rx="6" fill="#fff" stroke="#dadce0"/>
    <text x="260" y="26" text-anchor="middle" font-size="14" fill="#1a73e8">Pack extension</text>
    <rect x="360" width="160" height="40" rx="6" fill="#fff" stroke="#dadce0"/>
    <text x="440" y="26" text-anchor="middle" font-size="14" fill="#1a73e8">Update</text>
  </g>

  <!-- Annotation for Load unpacked -->
  <g stroke="#ea4335" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M128 280 Q128 240 128 224"/>
    <path d="M120 232 L128 220 L136 232"/>
  </g>
  <g transform="translate(48 290)">
    <rect width="280" height="40" rx="6" fill="#ea4335"/>
    <text x="140" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">② Click "Load unpacked" → pick folder</text>
  </g>

  <!-- Extension card preview -->
  <g transform="translate(48 380)">
    <rect width="904" height="180" rx="8" fill="#fff" stroke="#dadce0"/>
    <g transform="translate(28 40)">
      <circle r="22" fill="url(#greenGrad)"/>
      <g transform="translate(-9 -16)" fill="#0b1220">
        <rect x="0" y="0" width="18" height="22" rx="9"/>
        <path d="M-6 18 a15 15 0 0 0 30 0 v-2 h-4 v2 a11 11 0 0 1 -22 0 v-2 h-4 z"/>
      </g>
    </g>
    <text x="80" y="50" font-size="18" font-weight="500" fill="#202124">Auto Unmute</text>
    <text x="80" y="74" font-size="13" fill="#5f6368">1.0.0</text>
    <text x="80" y="108" font-size="13" fill="#5f6368">Automatically unmute yourself in Google Meet when you start talking.</text>
    <text x="80" y="128" font-size="12" fill="#5f6368">ID: kjeoap...</text>
    <g transform="translate(820 130)">
      <rect width="60" height="22" rx="11" fill="#1a73e8"/>
      <circle cx="48" cy="11" r="8" fill="#fff"/>
      <text x="-10" y="16" text-anchor="end" font-size="11" font-weight="600" fill="#1a73e8">ON</text>
    </g>
    <text x="28" y="156" font-size="11" fill="#5f6368">Loaded from /Users/you/auto_unmute</text>
  </g>
</svg>
