<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <title>Auto Unmute settings</title>
  <style>
    body { min-width: 380px; }
    #debug_image { width: 100%; max-width: 320px; border-radius: 4px; }
    .activity-label { font-weight: 600; }
    figure { margin: 0; text-align: center; font-size: 11px; }

    /* Audio level meter */
    .meter-wrap {
      position: relative;
      height: 14px;
      background: #e5e7eb;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 4px;
    }
    .meter-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0%;
      background: linear-gradient(90deg, #22c55e 0%, #eab308 70%, #dc2626 100%);
      transition: width 80ms linear;
    }
    .meter-thresh {
      position: absolute;
      top: -2px; bottom: -2px;
      width: 2px;
      background: #1f2937;
      pointer-events: none;
    }
    .meter-scale {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #6b7280;
      margin-top: 2px;
    }
    .audio-status {
      font-size: 11px;
      color: #6b7280;
      margin-top: 2px;
    }
    .audio-status.active { color: #16a34a; font-weight: 600; }
  </style>
</head>
<body>
  <div class="mx-2 my-1 px-2 py-1 small">
    <div class="mb-2 custom-control custom-switch">
      <input type="checkbox" class="custom-control-input" id="useAutoUnmute">
      <label class="custom-control-label" for="useAutoUnmute">Auto-unmute</label>
    </div>

    <div id="settings" class="ml-2 pl-2" style="display:none;">
      <h6 class="mb-2">Detection mode</h6>
      <form id="engineForm">
        <div class="custom-control custom-radio">
          <input type="radio" id="engineSpeech" name="engine" value="engineSpeech" class="custom-control-input">
          <label class="custom-control-label" for="engineSpeech">Audio only <span class="text-muted" style="font-size:11px;">(fastest)</span></label>
        </div>
        <div class="custom-control custom-radio">
          <input type="radio" id="engineImage" name="engine" value="engineImage" class="custom-control-input">
          <label class="custom-control-label" for="engineImage">Camera only <span class="text-muted" style="font-size:11px;">(mouth movement only)</span></label>
        </div>
        <div class="custom-control custom-radio">
          <input type="radio" id="engineRecognition" name="engine" value="engineRecognition" class="custom-control-input">
          <label class="custom-control-label" for="engineRecognition">Speech recognition only <span class="text-muted" style="font-size:11px;">(language based)</span></label>
        </div>
        <div class="custom-control custom-radio">
          <input type="radio" id="engineImageSpeech" name="engine" value="engineImageSpeech" class="custom-control-input">
          <label class="custom-control-label" for="engineImageSpeech">Audio + camera + speech recognition <span class="text-muted" style="font-size:11px;">(most reliable)</span></label>
        </div>
      </form>
      <hr class="m-2">

      <div class="form-group">
        <label for="speakFramesRequired">
          Consecutive detections required: <span id="speakFramesRequiredLabel">1</span> checks (~<span id="speakFramesMs">25</span> ms)
        </label>
        <input type="range" class="custom-range" min="1" max="10" step="1" id="speakFramesRequired">
      </div>

      <div id="audioSettings" class="form-group">
        <h6 class="mb-2">Audio Detection</h6>
        <label for="audioRmsThreshold">
          Mic sensitivity: trigger above <span id="audioThresholdLabel">-46</span> dB
          <span id="audioThresholdHint" class="text-muted" style="font-size:11px;">(quiet speech)</span>
        </label>
        <input type="range" class="custom-range" min="-60" max="-20" step="1" id="audioRmsThreshold">
        <div class="meter-scale">
          <span>-60</span><span>-50</span><span>-40</span><span>-30</span><span>-20 dB</span>
        </div>
        <div class="meter-wrap">
          <div class="meter-fill" id="audioMeterFill"></div>
          <div class="meter-thresh" id="audioMeterThresh"></div>
        </div>
        <div class="meter-scale">
          <span>silent</span><span>whisper</span><span>normal</span><span>loud</span><span>shout</span>
        </div>
        <div class="audio-status" id="audioStatus">Quiet</div>
        <div class="custom-control custom-switch mt-1">
          <input type="checkbox" class="custom-control-input" id="showAudioActivity" checked>
          <label class="custom-control-label" for="showAudioActivity" style="font-size:11px;">Show live mic level</label>
        </div>
      </div>

      <div id="imageSettings">
        <h6 class="mb-2">Camera Detection</h6>
        <div class="form-group">
          <label for="select_camera">Camera</label>
          <select class="custom-select custom-select-sm" id="select_camera"></select>
        </div>
        <div class="form-group">
          <label for="range_mar_thresh">
            Mouth-open threshold (lower = more sensitive):
            <span id="marThresholdLabel">0.20</span>
          </label>
          <div class="row align-items-center">
            <figure class="col-auto">
              <img src="images/idle32.png" width="22" height="22" alt="more">
              <figcaption>more</figcaption>
            </figure>
            <input type="range" class="custom-range col-7" min="0.05" max="0.60" step="0.01" id="range_mar_thresh">
            <figure class="col-auto">
              <img src="images/armed32.png" width="22" height="22" alt="less">
              <figcaption>less</figcaption>
            </figure>
          </div>
        </div>
        <div class="custom-control custom-switch mb-1">
          <input type="checkbox" class="custom-control-input" id="showImageActivity">
          <label class="custom-control-label" for="showImageActivity">Show camera diagnostics</label>
        </div>
        <img id="debug_image" alt=""><br>
      </div>

      <div id="speechSettings">
        <hr class="m-2">
        <h6 class="mb-2">Speech Recognition</h6>
        <div class="form-group">
          <label for="select_speech_lang">Language</label>
          <select class="custom-select custom-select-sm" id="select_speech_lang">
            <option value="en-US">English (US)</option>
            <option value="en-GB">English (UK)</option>
            <option value="ja">日本語</option>
            <option value="es-ES">Español</option>
            <option value="fr-FR">Français</option>
            <option value="de-DE">Deutsch</option>
            <option value="pt-BR">Português (BR)</option>
            <option value="zh-CN">中文 (简体)</option>
          </select>
        </div>
        <div class="custom-control custom-switch mb-1">
          <input type="checkbox" class="custom-control-input" id="showSpeechActivity">
          <label class="custom-control-label" for="showSpeechActivity">Show speech diagnostics</label>
        </div>
        <div id="speechRecognized" class="activity-label"></div>
        <div id="speechRecognizedWord"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
