<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="-apple-system, 'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1f2a44" stroke-width="1" opacity="0.5">
    <path d="M0 200 H1280 M0 400 H1280 M0 600 H1280"/>
    <path d="M320 0 V800 M640 0 V800 M960 0 V800"/>
  </g>

  <!-- Headline -->
  <text x="640" y="120" text-anchor="middle" font-size="56" font-weight="800" fill="#f8fafc">
    Forgot you were muted?
  </text>
  <text x="640" y="170" text-anchor="middle" font-size="24" font-weight="400" fill="#94a3b8">
    Auto Unmute turns your mic back on the moment you start talking.
  </text>

  <!-- Two cards: muted (before) and unmuted (after) -->
  <!-- Glow halos -->
  <ellipse cx="380" cy="500" rx="220" ry="110" fill="#ef4444" opacity="0.18" filter="url(#soft)"/>
  <ellipse cx="900" cy="500" rx="220" ry="110" fill="#22c55e" opacity="0.22" filter="url(#soft)"/>

  <!-- Muted card -->
  <g transform="translate(140 290)">
    <rect width="480" height="420" rx="24" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <text x="32" y="50" font-size="14" font-weight="700" letter-spacing="2" fill="#94a3b8">BEFORE</text>
    <text x="32" y="92" font-size="28" font-weight="700" fill="#f8fafc">You're muted.</text>
    <text x="32" y="124" font-size="18" fill="#cbd5e1">"...so as I was saying about the Q3 numbers..."</text>

    <!-- mic icon -->
    <g transform="translate(240 220)">
      <circle r="86" fill="url(#redGrad)" opacity="0.18"/>
      <circle r="64" fill="url(#redGrad)"/>
      <g transform="translate(-26 -34)" fill="#fff">
        <rect x="14" y="0" width="24" height="40" rx="12"/>
        <path d="M4 32 a22 22 0 0 0 44 0 v-4 h-6 v4 a16 16 0 0 1 -32 0 v-4 h-6 z"/>
        <rect x="22" y="60" width="8" height="14"/>
        <rect x="14" y="74" width="24" height="4" rx="2"/>
      </g>
      <!-- slash through -->
      <line x1="-58" y1="-58" x2="58" y2="58" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
    </g>

    <text x="240" y="380" text-anchor="middle" font-size="16" fill="#fca5a5" font-weight="600">Nobody hears a word.</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(640 500)" fill="#64748b">
    <path d="M-30 0 H 30 M 18 -12 L 30 0 L 18 12" stroke="#64748b" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="-22" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="1.5" fill="#64748b">~400 ms</text>
  </g>

  <!-- Unmuted card -->
  <g transform="translate(680 290)">
    <rect width="480" height="420" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
    <text x="32" y="50" font-size="14" font-weight="700" letter-spacing="2" fill="#22c55e">AFTER</text>
    <text x="32" y="92" font-size="28" font-weight="700" fill="#f8fafc">Auto-unmuted.</text>
    <text x="32" y="124" font-size="18" fill="#cbd5e1">Everyone hears you from the start.</text>

    <!-- mic icon (active) -->
    <g transform="translate(240 220)">
      <circle r="100" fill="url(#greenGrad)" opacity="0.10"/>
      <circle r="86" fill="url(#greenGrad)" opacity="0.22"/>
      <circle r="64" fill="url(#greenGrad)"/>
      <g transform="translate(-26 -34)" fill="#0b1220">
        <rect x="14" y="0" width="24" height="40" rx="12"/>
        <path d="M4 32 a22 22 0 0 0 44 0 v-4 h-6 v4 a16 16 0 0 1 -32 0 v-4 h-6 z"/>
        <rect x="22" y="60" width="8" height="14"/>
        <rect x="14" y="74" width="24" height="4" rx="2"/>
      </g>
      <!-- sound waves -->
      <g stroke="#22c55e" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9">
        <path d="M86 -20 Q104 0 86 20"/>
        <path d="M104 -32 Q132 0 104 32"/>
      </g>
    </g>

    <text x="240" y="380" text-anchor="middle" font-size="16" fill="#86efac" font-weight="600">Triggered by Ctrl/⌘+D, just like you would.</text>
  </g>
</svg>
