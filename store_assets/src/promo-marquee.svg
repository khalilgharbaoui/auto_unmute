<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560" font-family="-apple-system, 'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="48"/>
    </filter>
  </defs>

  <rect width="1400" height="560" fill="url(#bg)"/>
  <g stroke="#1f2a44" stroke-width="1" opacity="0.4">
    <path d="M0 140 H1400 M0 280 H1400 M0 420 H1400"/>
  </g>
  <ellipse cx="1080" cy="280" rx="280" ry="200" fill="#22c55e" opacity="0.20" filter="url(#soft)"/>
  <ellipse cx="320" cy="280" rx="200" ry="160" fill="#ef4444" opacity="0.14" filter="url(#soft)"/>

  <!-- Left text -->
  <g transform="translate(80 180)">
    <text font-size="64" font-weight="800" fill="#f8fafc">Forgot you</text>
    <text y="76" font-size="64" font-weight="800" fill="#f8fafc">were muted?</text>
    <text y="138" font-size="22" fill="#94a3b8">Auto Unmute hears you and turns the mic</text>
    <text y="166" font-size="22" fill="#94a3b8">back on. Never auto-mutes. 100% local.</text>

    <g transform="translate(0 200)">
      <rect width="220" height="44" rx="22" fill="url(#greenGrad)"/>
      <text x="110" y="29" text-anchor="middle" font-size="15" font-weight="800" fill="#0b1220">ADD TO CHROME</text>
    </g>
  </g>

  <!-- Right: muted → unmuted -->
  <g transform="translate(880 280)">
    <!-- muted -->
    <g transform="translate(-40 0)">
      <circle r="80" fill="url(#redGrad)" opacity="0.22"/>
      <circle r="56" fill="url(#redGrad)"/>
      <g transform="translate(-22 -28)" fill="#fff">
        <rect x="12" y="0" width="20" height="34" rx="10"/>
        <path d="M2 26 a20 20 0 0 0 40 0 v-3 h-5 v3 a14 14 0 0 1 -28 0 v-3 h-5 z"/>
        <rect x="20" y="50" width="6" height="12"/>
        <rect x="12" y="62" width="20" height="4" rx="2"/>
      </g>
      <line x1="-50" y1="-50" x2="50" y2="50" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
    </g>
    <!-- arrow -->
    <g transform="translate(110 0)" stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-30 0 H30 M18 -12 L30 0 L18 12"/>
      <text x="0" y="-22" text-anchor="middle" font-size="13" font-weight="700" fill="#94a3b8" stroke="none">~400 ms</text>
    </g>
    <!-- unmuted -->
    <g transform="translate(260 0)">
      <circle r="92" fill="url(#greenGrad)" opacity="0.12"/>
      <circle r="78" fill="url(#greenGrad)" opacity="0.22"/>
      <circle r="56" fill="url(#greenGrad)"/>
      <g transform="translate(-22 -28)" fill="#0b1220">
        <rect x="12" y="0" width="20" height="34" rx="10"/>
        <path d="M2 26 a20 20 0 0 0 40 0 v-3 h-5 v3 a14 14 0 0 1 -28 0 v-3 h-5 z"/>
        <rect x="20" y="50" width="6" height="12"/>
        <rect x="12" y="62" width="20" height="4" rx="2"/>
      </g>
      <g stroke="#22c55e" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9">
        <path d="M76 -16 Q92 0 76 16"/>
        <path d="M96 -28 Q120 0 96 28"/>
      </g>
    </g>
  </g>
</svg>
